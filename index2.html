<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Regalito Para July</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', 'Quicksand', 'Fredoka One', cursive, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
        }

        .btn-siguiente {
    padding: 12px 25px;
    font-size: 16px;
    background-color: #28a745; /* Color verde para indicar progreso */
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
    transition: all 0.3s ease;
}

        .btn-siguiente:hover {
    background-color: #218838;
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(40, 167, 69, 0.4);
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
}

        /* Mensaje central: Feliz día */
        .greeting {
            position: absolute;
            top: 30px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            z-index: 20;
            font-size: 2.5rem;
            font-weight: 800;
            text-shadow: 0 0 20px rgba(0,0,0,0.5), 0 0 5px #ffaa33;
            background: linear-gradient(135deg, #FFE55C, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            animation: fadeInDown 1s ease-out;
        }
        .greeting small {
            font-size: 1.1rem;
            display: block;
            color: #FFDE7A;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            text-shadow: 0 0 8px rgba(0,0,0,0.6);
            margin-top: 5px;
            font-weight: 500;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Controles y badge */
        .badge-control {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.7rem;
            pointer-events: none;
            font-weight: 500;
            color: #FFD966;
            border: 1px solid #FFD96680;
            z-index: 15;
        }
        .control-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            pointer-events: none;
            white-space: nowrap;
            font-family: monospace;
            letter-spacing: 1px;
            color: #FFE0A3;
            z-index: 15;
        }
        @media (max-width: 700px) {
            .greeting { font-size: 1.6rem; top: 20px; }
            .greeting small { font-size: 0.8rem; }
            .badge-control { font-size: 0.6rem; }
            .control-hint { font-size: 0.6rem; white-space: nowrap; }
        }
    </style>
</head>
<body>

    <!-- Mensaje -->eliz Cump
    <div class="greeting">
        🌻 Bueno mi July como te dije  mereces muchas flores asi que mira 🌻
        <small>✨ Un ramo de estrellas para ti ✨</small>
    </div>

    <div class="badge-control">🌀 360° | Galaxia de Girasoles</div>
    <div class="control-hint">🖱️ Arrastra para rotar 360° | Zoom con scroll</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Escena ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020210);
        scene.fog = new THREE.FogExp2(0x020210, 0.00045);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(13, 6, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        renderer.toneMappingExposure = 1.3;
        document.body.appendChild(renderer.domElement);

        // --- Postprocesado bloom ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.2, 0.4, 0.85);
        bloomPass.threshold = 0.08;
        bloomPass.strength = 0.75;
        bloomPass.radius = 0.6;
        const effectComposer = new EffectComposer(renderer);
        effectComposer.addPass(renderScene);
        effectComposer.addPass(bloomPass);

        // --- Controles 360° ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.5;
        controls.enableZoom = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.65;
        controls.target.set(0, 0.5, 0);

        // ---------- 1. FLORES EN FORMA DE GALAXIA ----------
        // Texturas variadas de flores amarillas 
        function createFlowerTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, 128, 128);
            const cx = 64, cy = 64;
            
            if (type === 0) { 
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const px = cx + Math.cos(angle) * 32;
                    const py = cy + Math.sin(angle) * 32;
                    ctx.beginPath();
                    ctx.ellipse(px, py, 22, 28, angle, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFE55C';
                    ctx.fill();
                }
            } else if (type === 1) { 
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const px = cx + Math.cos(angle) * 38;
                    const py = cy + Math.sin(angle) * 38;
                    ctx.save();
                    ctx.translate(px, py);
                    ctx.rotate(angle);
                    ctx.beginPath();
                    ctx.ellipse(0, 0, 16, 30, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFD966';
                    ctx.fill();
                    ctx.restore();
                }
            } else { // pequeña estrella
                for (let i = 0; i < 12; i++) {
                    const angle = (i / 12) * Math.PI * 2;
                    const px = cx + Math.cos(angle) * 28;
                    const py = cy + Math.sin(angle) * 28;
                    ctx.beginPath();
                    ctx.ellipse(px, py, 14, 18, angle, 0, Math.PI * 2);
                    ctx.fillStyle = '#FFE088';
                    ctx.fill();
                }
            }
            // centro común
            ctx.beginPath();
            ctx.arc(cx, cy, 16, 0, 2 * Math.PI);
            ctx.fillStyle = '#FF8C42';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cx, cy, 10, 0, 2 * Math.PI);
            ctx.fillStyle = '#D2691E';
            ctx.fill();
            ctx.fillStyle = '#FFF2B5';
            for (let i=0; i<20; i++) {
                const rad = Math.random() * 12;
                const ang = Math.random() * Math.PI * 2;
                const x = cx + Math.cos(ang) * rad;
                const y = cy + Math.sin(ang) * rad;
                ctx.beginPath();
                ctx.arc(x, y, 1.2, 0, 2*Math.PI);
                ctx.fill();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        const flowerTextures = [
            createFlowerTexture(0),
            createFlowerTexture(1),
            createFlowerTexture(2)
        ];

        const TOTAL_FLOWERS = 18500;
        const positions = new Float32Array(TOTAL_FLOWERS * 3);
        const colors = new Float32Array(TOTAL_FLOWERS * 3);
        const sizes = new Float32Array(TOTAL_FLOWERS);
        const texIndices = new Float32Array(TOTAL_FLOWERS);

        const arms = 4;
        const spiralTightness = 2.6;
        const armSpread = 0.58;
        const innerRadius = 1.0;
        const outerRadius = 16.2;

        for (let i = 0; i < TOTAL_FLOWERS; i++) {
            let radius, angle, yOffset;
            const isCore = Math.random() < 0.2;
            if (isCore) {
                radius = Math.pow(Math.random(), 1.3) * 3.8;
                angle = Math.random() * Math.PI * 2;
                yOffset = (Math.random() - 0.5) * 1.9 * (1 - radius / 5);
            } else {
                const armIdx = Math.floor(Math.random() * arms);
                const armAngleOffset = (armIdx / arms) * Math.PI * 2;
                const t = Math.pow(Math.random(), 1.1);
                radius = innerRadius + t * (outerRadius - innerRadius);
                const spiralAngle = spiralTightness * Math.log(radius + 0.6) + armAngleOffset;
                const randomAngleOffset = (Math.random() - 0.5) * armSpread * (1 + radius * 0.08);
                angle = spiralAngle + randomAngleOffset;
                yOffset = Math.sin(radius * 1.4 + armIdx) * 0.85 + (Math.random() - 0.5) * 0.8;
                if (Math.random() > 0.7) yOffset += (Math.random() - 0.5) * 0.9;
            }
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = yOffset * 1.3;
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            const distFactor = Math.min(1, Math.sqrt(x*x + y*y + z*z) / 14);
            let r = 1.0, g = 0.7 + Math.random() * 0.3, b = 0.1 + Math.random() * 0.3;
            if (distFactor < 0.3) { g = 0.55 + Math.random()*0.2; b = 0.08; }
            if (distFactor > 0.7) { g = 0.92; b = 0.45; }
            colors[i*3] = r;
            colors[i*3+1] = g;
            colors[i*3+2] = b;
            
            let sizeVal = 0.28 + Math.random() * 0.48;
            if (distFactor < 0.3) sizeVal *= 0.85;
            if (distFactor > 0.8) sizeVal *= 1.25;
            if (Math.random() > 0.93) sizeVal *= 1.55;
            sizes[i] = sizeVal;
            texIndices[i] = Math.floor(Math.random() * flowerTextures.length);
        }

        const flowerGeometry = new THREE.BufferGeometry();
        flowerGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        flowerGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        flowerGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        flowerGeometry.setAttribute('texIndex', new THREE.BufferAttribute(texIndices, 1));

        const vertexShader = `
            attribute float size;
            attribute vec3 color;
            attribute float texIndex;
            varying vec3 vColor;
            varying float vTexIndex;
            void main() {
                vColor = color;
                vTexIndex = texIndex;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                gl_PointSize = size * ( 300.0 / ( - mvPosition.z ) ) * 0.95;
                gl_PointSize = clamp(gl_PointSize, 7.0, 48.0);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform sampler2D uTextures[3];
            varying vec3 vColor;
            varying float vTexIndex;
            void main() {
                int idx = int(round(vTexIndex));
                vec4 texColor;
                if (idx == 0) texColor = texture2D(uTextures[0], gl_PointCoord);
                else if (idx == 1) texColor = texture2D(uTextures[1], gl_PointCoord);
                else texColor = texture2D(uTextures[2], gl_PointCoord);
                if (texColor.a < 0.2) discard;
                vec3 finalColor = vColor * texColor.rgb;
                finalColor += vec3(0.2, 0.12, 0.04);
                gl_FragColor = vec4(finalColor, texColor.a * 0.95);
            }
        `;

        const flowerMaterial = new THREE.ShaderMaterial({
            uniforms: { uTextures: { value: flowerTextures } },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const flowerPoints = new THREE.Points(flowerGeometry, flowerMaterial);
        scene.add(flowerPoints);

        // ---------- 2. RAMOS DE GIRASOLES (SUNFLOWERS) EN 3D ----------
        // Función para crear un girasol individual (tallo, hojas, flor con pétalos)
        function createSunflower(x, z, yOffset = 0, scaleFactor = 1.0) {
            const group = new THREE.Group();
            
            // Tallo 
            const stemGeo = new THREE.CylinderGeometry(0.12 * scaleFactor, 0.18 * scaleFactor, 1.1 * scaleFactor, 6);
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x5a9e4e, roughness: 0.6, metalness: 0.1 });
            const stem = new THREE.Mesh(stemGeo, stemMat);
            stem.position.y = -0.55 * scaleFactor;
            group.add(stem);
            
            // Hojas 
            const leafMat = new THREE.MeshStandardMaterial({ color: 0x6ab04c });
            const leaf1Geo = new THREE.BoxGeometry(0.35 * scaleFactor, 0.08 * scaleFactor, 0.2 * scaleFactor);
            const leaf1 = new THREE.Mesh(leaf1Geo, leafMat);
            leaf1.position.set(0.25 * scaleFactor, -0.3 * scaleFactor, 0);
            leaf1.rotation.z = 0.5;
            group.add(leaf1);
            
            const leaf2 = new THREE.Mesh(leaf1Geo, leafMat);
            leaf2.position.set(-0.25 * scaleFactor, -0.3 * scaleFactor, 0);
            leaf2.rotation.z = -0.5;
            group.add(leaf2);
            
            // Centro de la flor 
            const centerGeo = new THREE.SphereGeometry(0.28 * scaleFactor, 16, 16);
            const centerMat = new THREE.MeshStandardMaterial({ color: 0xb5651d, emissive: 0x7a3e0a, emissiveIntensity: 0.25 });
            const center = new THREE.Mesh(centerGeo, centerMat);
            center.position.y = 0.1 * scaleFactor;
            group.add(center);
            
            // Pétalos amarillos alrededor (12 pétalos planos)
            const petalMat = new THREE.MeshStandardMaterial({ color: 0xffcc44, emissive: 0xffaa33, emissiveIntensity: 0.2 });
            for (let i = 0; i < 14; i++) {
                const angle = (i / 14) * Math.PI * 2;
                const petalGeo = new THREE.CylinderGeometry(0.22 * scaleFactor, 0.24 * scaleFactor, 0.6 * scaleFactor, 5);
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.position.x = Math.cos(angle) * 0.48 * scaleFactor;
                petal.position.z = Math.sin(angle) * 0.48 * scaleFactor;
                petal.position.y = 0.05 * scaleFactor;
                petal.rotation.z = angle;
                petal.rotation.x = 0.4;
                group.add(petal);
            }
            // Segunda capa de pétalos más pequeños
            for (let i = 0; i < 10; i++) {
                const angle = (i / 10) * Math.PI * 2 + 0.3;
                const petalGeo = new THREE.CylinderGeometry(0.16 * scaleFactor, 0.18 * scaleFactor, 0.5 * scaleFactor, 5);
                const petal = new THREE.Mesh(petalGeo, petalMat);
                petal.position.x = Math.cos(angle) * 0.62 * scaleFactor;
                petal.position.z = Math.sin(angle) * 0.62 * scaleFactor;
                petal.position.y = 0.02 * scaleFactor;
                petal.rotation.z = angle;
                petal.rotation.x = 0.3;
                group.add(petal);
            }
            
            group.position.set(x, yOffset, z);
            // Rotación aleatoria para que no todos miren igual
            group.rotation.y = Math.random() * Math.PI * 2;
            return group;
        }
        
        const sunflowerPositions = [];
        // Núcleo: algunos alrededor
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const radius = 1.8 + Math.random() * 1.2;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            sunflowerPositions.push({ x, z, y: -0.2 + Math.random() * 0.5, scale: 0.9 + Math.random() * 0.3 });
        }
        // Brazos espirales
        const armAngles = [0, Math.PI/2, Math.PI, 3*Math.PI/2];
        for (let a = 0; a < armAngles.length; a++) {
            for (let r = 3.5; r <= 12; r += 2.2) {
                const angleOffset = armAngles[a];
                const spiralBase = spiralTightness * Math.log(r + 0.8);
                const angle = spiralBase + angleOffset + (Math.random() - 0.5) * 0.8;
                const x = Math.cos(angle) * r;
                const z = Math.sin(angle) * r;
                const y = Math.sin(r * 1.2) * 0.4 + (Math.random() - 0.5) * 0.4;
                sunflowerPositions.push({ x, z, y: y - 0.1, scale: 0.8 + Math.random() * 0.5 });
            }
        }
        // Ramos adicionales flotantes
        for (let i = 0; i < 12; i++) {
            const rad = 6 + Math.random() * 7;
            const ang = Math.random() * Math.PI * 2;
            const x = Math.cos(ang) * rad;
            const z = Math.sin(ang) * rad;
            const y = (Math.random() - 0.5) * 1.2;
            sunflowerPositions.push({ x, z, y: y, scale: 0.7 + Math.random() * 0.6 });
        }
        
        const sunflowersGroup = new THREE.Group();
        sunflowerPositions.forEach(pos => {
            const sunflower = createSunflower(pos.x, pos.z, pos.y, pos.scale);
            sunflowersGroup.add(sunflower);
        });
        scene.add(sunflowersGroup);
        
        // Añadir algunas partículas de polen alrededor de los girasoles (efecto brillo)
        const pollenCount = 1800;
        const pollenPositions = new Float32Array(pollenCount * 3);
        for (let i = 0; i < pollenCount; i++) {
            const idx = Math.floor(Math.random() * sunflowerPositions.length);
            const base = sunflowerPositions[idx];
            const offsetX = (Math.random() - 0.5) * 1.2;
            const offsetZ = (Math.random() - 0.5) * 1.2;
            const offsetY = (Math.random() - 0.5) * 1.0;
            pollenPositions[i*3] = base.x + offsetX;
            pollenPositions[i*3+1] = base.y + offsetY + 0.2;
            pollenPositions[i*3+2] = base.z + offsetZ;
        }
        const pollenGeo = new THREE.BufferGeometry();
        pollenGeo.setAttribute('position', new THREE.BufferAttribute(pollenPositions, 3));
        const pollenMat = new THREE.PointsMaterial({ color: 0xffdd88, size: 0.05, transparent: true, blending: THREE.AdditiveBlending });
        const pollenPoints = new THREE.Points(pollenGeo, pollenMat);
        scene.add(pollenPoints);
        
        // ---------- 3. ELEMENTOS DE FONDO: ESTRELLAS Y POLVO ----------
        const starCount = 4500;
        const starPositionsArr = new Float32Array(starCount * 3);
        const starColorsArr = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const rad = 40 + Math.random() * 55;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            starPositionsArr[i*3] = rad * Math.sin(phi) * Math.cos(theta);
            starPositionsArr[i*3+1] = rad * Math.sin(phi) * Math.sin(theta) * 0.5;
            starPositionsArr[i*3+2] = rad * Math.cos(phi);
            const intens = 0.4 + Math.random() * 0.8;
            starColorsArr[i*3] = intens * (Math.random() > 0.6 ? 1.0 : 0.7);
            starColorsArr[i*3+1] = intens * (Math.random() > 0.5 ? 0.9 : 0.6);
            starColorsArr[i*3+2] = intens * 0.5;
        }
        const starGeo = new THREE.BufferGeometry();
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPositionsArr, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starColorsArr, 3));
        const starMatObj = new THREE.PointsMaterial({ size: 0.16, vertexColors: true, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        const starsField = new THREE.Points(starGeo, starMatObj);
        scene.add(starsField);
        
        const dustCount = 8000;
        const dustPositions = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            const radius = 5 + Math.random() * 14;
            const ang = Math.random() * Math.PI * 2;
            const y = (Math.random() - 0.5) * 4.5;
            dustPositions[i*3] = Math.cos(ang) * radius * (0.6 + Math.random() * 0.7);
            dustPositions[i*3+1] = y + (Math.random() - 0.5) * 1.5;
            dustPositions[i*3+2] = Math.sin(ang) * radius * (0.6 + Math.random() * 0.7);
        }
        const dustGeoObj = new THREE.BufferGeometry();
        dustGeoObj.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
        const dustMatObj = new THREE.PointsMaterial({ color: 0xffaa66, size: 0.055, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending });
        const dustCloud = new THREE.Points(dustGeoObj, dustMatObj);
        scene.add(dustCloud);
        
        // ---------- 4. NÚCLEO BRILLANTE Y HALO ----------
        const coreGlow = new THREE.Mesh(
            new THREE.SphereGeometry(1.4, 32, 32),
            new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff6600, emissiveIntensity: 1.6, roughness: 0.2 })
        );
        scene.add(coreGlow);
        
        const haloCount = 1500;
        const haloPositions = new Float32Array(haloCount * 3);
        for (let i = 0; i < haloCount; i++) {
            const rad = 1.8 + Math.random() * 2.2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            haloPositions[i*3] = rad * Math.sin(phi) * Math.cos(theta);
            haloPositions[i*3+1] = rad * Math.sin(phi) * Math.sin(theta) * 0.7;
            haloPositions[i*3+2] = rad * Math.cos(phi);
        }
        const haloGeo = new THREE.BufferGeometry();
        haloGeo.setAttribute('position', new THREE.BufferAttribute(haloPositions, 3));
        const haloMatPoints = new THREE.PointsMaterial({ color: 0xffaa77, size: 0.08, blending: THREE.AdditiveBlending });
        const haloRing = new THREE.Points(haloGeo, haloMatPoints);
        scene.add(haloRing);
        
        // Luces
        const ambientLight = new THREE.AmbientLight(0x221100);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffaa55, 1.2, 30);
        pointLight.position.set(2, 1.5, 2);
        scene.add(pointLight);
        const backLight = new THREE.PointLight(0xffaa66, 0.7);
        backLight.position.set(-3, 2, -5);
        scene.add(backLight);
        const fillLight = new THREE.PointLight(0xffcc88, 0.6);
        fillLight.position.set(1, 3, 3);
        scene.add(fillLight);
        
        // ---------- ANIMACIÓN Y ROTACIONES ----------
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.008;
            
            const intensity = 1.4 + Math.sin(time * 2.5) * 0.4;
            coreGlow.material.emissiveIntensity = intensity;
            pointLight.intensity = 0.9 + Math.sin(time * 2.2) * 0.25;
            
            dustCloud.rotation.y = time * 0.03;
            starsField.rotation.x = Math.sin(time * 0.05) * 0.05;
            starsField.rotation.y = time * 0.01;
            haloRing.rotation.y = time * 0.1;
            haloRing.rotation.x = Math.sin(time * 0.2) * 0.1;
            pollenPoints.rotation.y = time * 0.02;
            
            // Hacer que los girasoles tengan un leve movimiento de balanceo
            sunflowersGroup.children.forEach((sunflower, idx) => {
                sunflower.rotation.z = Math.sin(time * 1.2 + idx) * 0.03;
                sunflower.rotation.x = Math.cos(time * 1.0 + idx) * 0.02;
            });
            
            controls.update();
            effectComposer.render();
        }
        animate();
        
        // Resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            effectComposer.setSize(window.innerWidth, window.innerHeight);
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('🌻 Galaxia de Girasoles - Feliz día de las Flores Amarillas');

        
    </script>
